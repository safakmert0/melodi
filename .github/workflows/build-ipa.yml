name: Build IPA

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.6'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build unsigned IPA
        run: flutter build ios --release --no-codesign

      - name: Extract version
        id: version
        run: |
          echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          echo "ipa=Melodi-${GITHUB_REF_NAME}.ipa" >> $GITHUB_OUTPUT

      - name: Rename IPA
        run: |
          mv build/ios/ipa/melodi.ipa build/ios/ipa/${{ steps.version.outputs.ipa }}

      - name: Upload IPA to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/ios/ipa/${{ steps.version.outputs.ipa }}
          fail_on_unmatched_files: false

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.ipa }}
          path: build/ios/ipa/${{ steps.version.outputs.ipa }}
