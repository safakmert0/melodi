name: Build IPA

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          flutter pub get
          cd ios
          if ! grep -q "platform :ios" Podfile; then
            sed -i '' '1s/^/platform :ios, '\''13.0'\''\n/' Podfile
          fi
          pod install
          cd ..

      - name: Disable code signing
        run: |
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' ios/Runner.xcodeproj/project.pbxproj || true
          sed -i '' 's/DEVELOPMENT_TEAM = .*//g' ios/Runner.xcodeproj/project.pbxproj || true
          sed -i '' 's/CODE_SIGN_IDENTITY = .*//g' ios/Runner.xcodeproj/project.pbxproj || true
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = .*//g' ios/Runner.xcodeproj/project.pbxproj || true
          echo 'CODE_SIGNING_REQUIRED=NO' >> ios/Flutter/Release.xcconfig
          echo 'CODE_SIGNING_ALLOWED=NO' >> ios/Flutter/Release.xcconfig

      - name: Build unsigned IPA
        run: |
          flutter build ios --release --no-codesign
          mkdir -p build/unsigned_ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/unsigned_ipa/Payload/
          cd build/unsigned_ipa
          zip -r ../Melodi-unsigned.ipa Payload/
        shell: bash

      - name: Extract version
        id: version
        run: |
          echo "ipa=Melodi-${GITHUB_REF_NAME}.ipa" >> $GITHUB_OUTPUT

      - name: Upload IPA to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/Melodi-unsigned.ipa
          fail_on_unmatched_files: false

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ steps.version.outputs.ipa }}
          path: build/Melodi-unsigned.ipa
