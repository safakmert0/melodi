name: Build iOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'
          cache: true

      - name: Install & Build
        run: |
          flutter pub get
          flutter create --platforms=ios .
          cd ios && pod install && cd ..
          for f in ios/Flutter/Debug.xcconfig ios/Flutter/Release.xcconfig; do
            echo 'CODE_SIGN_IDENTITY=' >> "$f"
            echo 'CODE_SIGNING_REQUIRED=NO' >> "$f"
            echo 'CODE_SIGNING_ALLOWED=NO' >> "$f"
            echo 'DEVELOPMENT_TEAM=' >> "$f"
            echo 'PROVISIONING_PROFILE_SPECIFIER=' >> "$f"
          done
          flutter build ios --release --no-codesign || true

      - name: Upload build output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Melodi-${{ github.ref_name }}-build
          path: build/ios/
          retention-days: 7
