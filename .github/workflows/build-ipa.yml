name: Build iOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'
          cache: true

      - name: Setup & Build
        run: |
          flutter pub get
          flutter create --platforms=ios .
          cat > ios/Podfile << 'EOF'
          platform :ios, '13.0'
          ENV['COCOAPODS_DISABLE_STATS'] = 'true'
          project 'Runner', {
            'Debug' => :debug,
            'Profile' => :release,
            'Release' => :release,
          }
          def flutter_root
            generated_xcode_build_settings_path = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)
            unless File.exist?(generated_xcode_build_settings_path)
              raise "#{generated_xcode_build_settings_path} must exist. If you're running pod install manually, make sure flutter pub get is executed first"
            end
            File.foreach(generated_xcode_build_settings_path) do |line|
              matches = line.match(/FLUTTER_ROOT\=(.*)/)
              return matches[1].strip if matches
            end
            raise "FLUTTER_ROOT not found in #{generated_xcode_build_settings_path}"
          end
          require File.expand_path(File.join('packages', 'flutter_tools', 'bin', 'podhelper'), flutter_root)
          flutter_ios_podfile_setup
          target 'Runner' do
            use_frameworks!
            use_modular_headers!
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
          end
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
            end
          end
          EOF
          cd ios && pod install && cd ..
          for f in ios/Flutter/Debug.xcconfig ios/Flutter/Release.xcconfig; do
            echo 'CODE_SIGN_IDENTITY=' >> "$f"
            echo 'CODE_SIGNING_REQUIRED=NO' >> "$f"
            echo 'CODE_SIGNING_ALLOWED=NO' >> "$f"
            echo 'DEVELOPMENT_TEAM=' >> "$f"
            echo 'PROVISIONING_PROFILE_SPECIFIER=' >> "$f"
          done
          flutter build ios --release --no-codesign || true

      - name: Upload build output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Melodi-${{ github.ref_name }}-build
          path: build/ios/
          retention-days: 7
