name: Build IPA

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: macos-14
    env:
      DEVELOPER_DIR: /Applications/Xcode_15.4.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'
          cache: true

      - name: Setup iOS project
        run: |
          rm -rf ios
          flutter create --platforms=ios .
          cd ios && pod install && cd ..

      - name: Disable signing and build
        run: |
          # Patch all xcconfig files
          for f in ios/Flutter/*.xcconfig; do
            echo 'CODE_SIGN_IDENTITY=' >> "$f"
            echo 'CODE_SIGNING_REQUIRED=NO' >> "$f"
            echo 'CODE_SIGNING_ALLOWED=NO' >> "$f"
            echo 'DEVELOPMENT_TEAM=' >> "$f"
            echo 'PROVISIONING_PROFILE_SPECIFIER=' >> "$f"
          done
          # Patch pbxproj
          sed -i '' 's/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = "iPhone Developer"/"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = ""/g' ios/Runner.xcodeproj/project.pbxproj
          # Build
          flutter build ios --release --no-codesign
          mkdir -p build/unsigned_ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/unsigned_ipa/Payload/
          cd build/unsigned_ipa
          zip -r ../Melodi-unsigned.ipa Payload/

      - name: Extract version
        id: version
        run: echo "ipa=Melodi-${GITHUB_REF_NAME}.ipa" >> $GITHUB_OUTPUT

      - name: Upload IPA to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/Melodi-unsigned.ipa
          fail_on_unmatched_files: false

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ steps.version.outputs.ipa }}
          path: build/Melodi-unsigned.ipa
