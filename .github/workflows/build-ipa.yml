name: Build iOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          flutter pub get
          flutter create . --platforms=ios
          echo "DEVELOPMENT_TEAM = 0000000000" >> ios/Flutter/Debug.xcconfig
          echo "DEVELOPMENT_TEAM = 0000000000" >> ios/Flutter/Release.xcconfig
          # Overwrite Podfile to ensure correct platform and no missing pods
          cat > ios/Podfile << 'PODEOF'
          platform :ios, '13.0'
          ENV['COCOAPODS_DISABLE_STATS'] = 'true'
          project 'Runner', {
            'Debug' => :debug,
            'Profile' => :release,
            'Release' => :release,
          }
          def flutter_root
            generated_xcode_build_settings_path = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)
            unless File.exist?(generated_xcode_build_settings_path)
              raise "#{generated_xcode_build_settings_path} must exist. If you're running pod install manually, make sure flutter pub get is executed first"
            end
            File.foreach(generated_xcode_build_settings_path) do |line|
              matches = line.match(/FLUTTER_ROOT\=(.*)/)
              return matches[1].strip if matches
            end
            raise "FLUTTER_ROOT not found in #{generated_xcode_build_settings_path}. Try deleting Generated.xcconfig, then run flutter pub get"
          end
          require File.expand_path(File.join('packages', 'flutter_tools', 'bin', 'podhelper'), flutter_root)
          flutter_ios_podfile_setup
          target 'Runner' do
            use_frameworks!
            use_modular_headers!
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
          end
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
              end
            end
          end
          PODEOF

      - name: Add keychain entitlements
        run: |
          cat > ios/Runner/Runner.entitlements << 'XMLEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.app-sandbox</key>
            <true/>
            <key>keychain-access-groups</key>
            <array>
              <string>$(AppIdentifierPrefix)com.example.melodiV2</string>
            </array>
          </dict>
          </plist>
          XMLEOF

      - name: Patch project for entitlements
        run: |
          python3 << 'PYEOF'
          import re
          pbx = "ios/Runner.xcodeproj/project.pbxproj"
          with open(pbx) as f:
              content = f.read()
          # Add CODE_SIGN_ENTITLEMENTS to Runner target configs only
          # These are the blocks containing PRODUCT_BUNDLE_IDENTIFIER = com.example.melodiV2
          marker = 'PRODUCT_BUNDLE_IDENTIFIER = com.example.melodiV2;'
          replacement = 'CODE_SIGN_ENTITLEMENTS = "Runner/Runner.entitlements";\n\t\t\t\tPRODUCT_BUNDLE_IDENTIFIER = com.example.melodiV2;'
          content = content.replace(marker, replacement)
          with open(pbx, 'w') as f:
              f.write(content)
          print("Patched project.pbxproj with entitlements")
          PYEOF

      - name: Install CocoaPods
        run: cd ios && pod install && cd ..

      - name: Build iOS Device (unsigned)
        run: flutter build ios --release --no-codesign

      - name: Package as IPA
        run: |
          DEVICE_APP=$(find build/ios/iphoneos -name "Runner.app" -maxdepth 1)
          if [ -z "$DEVICE_APP" ]; then
            echo "Runner.app not found in device build"
            find build/ios/ -name "Runner.app" -type d
            exit 1
          fi
          mkdir -p build/unsigned_ipa/Payload
          cp -r "$DEVICE_APP" build/unsigned_ipa/Payload/
          cd build/unsigned_ipa
          zip -r ../Melodi-${GITHUB_REF_NAME}.ipa Payload/

      - name: Upload IPA to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/Melodi-${{ github.ref_name }}.ipa
          fail_on_unmatched_files: false
          body: |
            ## Melodi ${{ github.ref_name }}

            ### Bug Fix
            - CI build artık simulator yerine gerçek iPhone cihazı için compile ediyor
            - SideStore/AltStore ile kurulum hatası düzeltildi

            ### Kurulum
            1. [SideStore](https://sidestore.io) veya [Sideloadly](https://sideloadly.io) indirin
            2. IPA dosyasını yükleyin
            3. Apple ID ile imzalayın ve kurun

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Melodi-${{ github.ref_name }}-ipa
          path: build/Melodi-${{ github.ref_name }}.ipa
