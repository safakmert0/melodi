name: Build IPA

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          flutter pub get
          flutter create . --platforms=ios

      - name: Write Podfile
        run: |
          cat > ios/Podfile << 'PODEOF'
          platform :ios, '13.0'
          ENV['COCOAPODS_DISABLE_STATS'] = 'true'
          project 'Runner', {
            'Debug' => :debug,
            'Profile' => :release,
            'Release' => :release,
          }
          def flutter_root
            generated_xcode_build_settings_path = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)
            unless File.exist?(generated_xcode_build_settings_path)
              raise "#{generated_xcode_build_settings_path} must exist. If you're running pod install manually, make sure flutter pub get is executed first"
            end
            File.foreach(generated_xcode_build_settings_path) do |line|
              matches = line.match(/FLUTTER_ROOT\=(.*)/)
              return matches[1].strip if matches
            end
            raise "FLUTTER_ROOT not found in #{generated_xcode_build_settings_path}"
          end
          require File.expand_path(File.join('packages', 'flutter_tools', 'bin', 'podhelper'), flutter_root)
          flutter_ios_podfile_setup
          target 'Runner' do
            use_frameworks!
            use_modular_headers!
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
          end
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
            end
          end
          PODEOF

      - name: Pod install
        run: cd ios && pod install && cd ..

      - name: Patch xcconfig for codesign
        run: |
          for f in ios/Flutter/Debug.xcconfig ios/Flutter/Release.xcconfig ios/Flutter/Profile.xcconfig; do
            if [ -f "$f" ]; then
              echo 'CODE_SIGN_IDENTITY=' >> "$f"
              echo 'CODE_SIGNING_REQUIRED=NO' >> "$f"
              echo 'CODE_SIGNING_ALLOWED=NO' >> "$f"
              echo 'DEVELOPMENT_TEAM=' >> "$f"
              echo 'PROVISIONING_PROFILE_SPECIFIER=' >> "$f"
            fi
          done

      - name: Build unsigned IPA
        run: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace -scheme Runner -configuration Release -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            BUILD_DIR=../build/ios \
            SYMROOT=../build/ios
          cd ..
          mkdir -p build/unsigned_ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/unsigned_ipa/Payload/
          cd build/unsigned_ipa
          zip -r ../Melodi-unsigned.ipa Payload/

      - name: Extract version
        id: version
        run: echo "ipa=Melodi-${GITHUB_REF_NAME}.ipa" >> $GITHUB_OUTPUT

      - name: Upload IPA to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/Melodi-unsigned.ipa
          fail_on_unmatched_files: false

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ steps.version.outputs.ipa }}
          path: build/Melodi-unsigned.ipa
