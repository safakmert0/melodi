name: Build iOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'
          cache: true

      - name: Build iOS Simulator
        run: |
          flutter pub get
          flutter build ios --release --simulator

      - name: Package as IPA
        run: |
          SIM_APP=$(find build/ios/iphonesimulator -name "Runner.app" -maxdepth 1)
          if [ -z "$SIM_APP" ]; then
            echo "Runner.app not found in simulator build"
            find build/ios/ -name "Runner.app" -type d
            exit 1
          fi
          mkdir -p build/unsigned_ipa/Payload
          cp -r "$SIM_APP" build/unsigned_ipa/Payload/
          cd build/unsigned_ipa
          zip -r ../Melodi-${GITHUB_REF_NAME}.ipa Payload/

      - name: Upload IPA to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/Melodi-${{ github.ref_name }}.ipa
          fail_on_unmatched_files: false
          body: |
            ## Melodi v${{ github.ref_name }}

            ### Stitch Tasarım Sistemi
            - Tüm ekranlar Stitch tasarımına göre yeniden yazıldı
            - Be Vietnam Pro font sistemi eklendi
            - Glassmorphism navigasyon barı ve mini player
            - Stitch logosu uygulandı

            ### Yeni Ekranlar
            - Queue Screen (sıra yönetimi)
            - Lyrics Screen (tam ekran şarkı sözleri)
            - Create/Edit Playlist
            - Download Manager (depolama görünümü)

            ### Animasyonlar
            - Splash screen dalga animasyonu
            - Hero transitions
            - Download progress animasyonları

            ### Teknik
            - 53+ dosya değiştirildi, 10 yeni dosya
            - Flutter 3.44.2
            - iOS 13.0+
            - Unsigned IPA (Sideloadly/AltStore ile kurulum gerekli)

            ### Kurulum
            1. [Sideloadly](https://sideloadly.io) veya [AltStore](https://altstore.io) indirin
            2. IPA dosyasını yükleyin
            3. Apple ID ile imzalayın ve kurun

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Melodi-${{ github.ref_name }}-ipa
          path: build/Melodi-${{ github.ref_name }}.ipa
