name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to build (e.g., v2.1.1)'
        required: true
        default: 'v2.1.1'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: |
          flutter pub get
          flutter create . --platforms=ios
          echo 'platform :ios, "13.0"' > ios/Podfile.tmp
          cat ios/Podfile >> ios/Podfile.tmp
          mv ios/Podfile.tmp ios/Podfile
          echo "DEVELOPMENT_TEAM = 0000000000" >> ios/Flutter/Debug.xcconfig
          echo "DEVELOPMENT_TEAM = 0000000000" >> ios/Flutter/Release.xcconfig
          cd ios && pod install && cd ..

      - name: Build unsigned .ipa
        run: |
          flutter build ios --release --no-codesign
          mkdir -p build/unsigned_ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/unsigned_ipa/Payload/
          cd build/unsigned_ipa
          zip -r ../Melodi-unsigned.ipa Payload/

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Melodi-unsigned-ipa
          path: build/Melodi-unsigned.ipa
          compression-level: 0

      - name: Upload IPA to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/Melodi-unsigned.ipa
          asset_name: Melodi-${{ github.event.inputs.version }}.ipa
          tag: ${{ github.event.inputs.version }}
          overwrite: true
