name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.2

      - name: Install dependencies
        run: |
          flutter pub get
          flutter create . --platforms=ios
          echo "DEVELOPMENT_TEAM = 0000000000" >> ios/Flutter/Debug.xcconfig
          echo "DEVELOPMENT_TEAM = 0000000000" >> ios/Flutter/Release.xcconfig
          cd ios && pod install && cd ..

      - name: Build unsigned .ipa
        run: |
          flutter build ios --release --no-codesign
          mkdir -p build/unsigned_ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/unsigned_ipa/Payload/
          cd build/unsigned_ipa
          zip -r ../Melodi-unsigned.ipa Payload/
          cd ../../

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Melodi-unsigned-ipa
          path: build/Melodi-unsigned.ipa
          compression-level: 0
